name: Notion to GitHub Sync

on:
  schedule:
    - cron: "0 0 * * *"  # 每天定时同步
  workflow_dispatch:  # 支持手动触发

jobs:
  sync-notion:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      # 3. 安装依赖
      - name: Install dependencies
        run: |
          pip install notion-client markdown

      # 4. 检查同步脚本是否存在
      - name: Verify sync script exists
        run: |
          if [ ! -f "scripts/notion_sync.py" ]; then
            echo "ERROR: scripts/notion_sync.py not found. Please ensure the script is committed to the repository."
            exit 1
          fi
          echo "Script found: scripts/notion_sync.py"

      # 5. 同步所有 Notion 页面到本地
      - name: Sync Notion pages
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}  # Notion Integration Key
        run: |
          python3 scripts/notion_sync.py

      # 6. 提交同步后的内容
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "actions@github.com"
          git add notion_pages/
          git commit -m "Sync all Notion pages" || echo "No changes to commit"
          git push
